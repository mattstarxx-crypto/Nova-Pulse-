<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f2639"/>
      <stop offset="100%" stop-color="#091924"/>
    </radialGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38c9d8"/>
      <stop offset="100%" stop-color="#4ecba0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- N letter -->
  <text x="5" y="23" font-family="Arial Black, sans-serif" font-weight="900" font-size="19" fill="url(#pulse)">N</text>
  <!-- Star -->
  <text x="22" y="12" font-family="Arial" font-size="9" fill="#38c9d8" opacity="0.9">✦</text>
</svg>
